body:
  text: 青箱雜記卷一宋吳處厚撰雷德驤長安人太祖時久居諫諍之任有直名與趙普有隙時普以勳舊作相寵遇方渥驤間請對言普專權容堂吏納賂由是忤㫖貶商州司戶嵗餘其子有鄰撾登聞鼓訴寃鞫得其實堂吏李可度除名餘黨皆杖脊黥配逺州出普知河陽召德驤復舊官擢有鄰守校書郎後普復入相德驤懇乞致仕太宗勉之曰朕終保卿必不為普所擠有鄰性亦剛鯁有父風太宗嘗面諭有鄰朕欲用汝父為相何如有鄰對曰臣父有才略而無度量非宰相器乃止有鄰弟有終亦有才平蜀寇最有功為宣徽使薨德驤有終父子二人常並命為江南兩路轉運使當世榮之王禹稱贈詩二首其一曰江南江北接王畿漕運帆檣去似飛父子有才同富國君王無事免宵衣屏除奸吏魂應喪養活疲民肉漸肥還有文場受恩客望塵情抱倍依依其二曰當時詞氣壓朱雲老作皇家諫諍臣章疏罷封無事日朝廷猶指直言人題詩野館光泉石講易秋堂動鬼神棘寺下僚叨末路齊心唯祝秉鴻鈞蓋禹稱常出德驤門下而德驤深於易酷嗜吟詠故也有終有將略自平蜀後人為立祠又嘗以私財犒士貧不能足貸錢以給比捐館時猶逋三萬緡真宗特出內帑償之故魏野哭有終詩曰聖代賢臣喪何人不慘顔新祠人祭祀舊債帝填還鹵簿塵侵暗銘旌泪灑班功名誰復繼敕葬向家山洛陽龍門有吕文穆公讀書龕云文穆昔嘗棲偃於此初有友二人一人則溫尚書仲舒一人忘其姓名而三人誓不得狀元不仕及唱第文穆狀元溫已不意然猶中甲科遂釋褐其一人徑拂衣歸𨼆後文穆作相太宗問昔誰為友文穆即以歸𨼆者對遽以著作佐郎召之不起故文穆罷相尹洛作詩曰昔作儒生謁貢闈今提相印出黃扉九重鵷鷺醉中别萬里烟霄達了歸鄰叟盡垂新鶴髮故人猶著舊麻衣洛陽謾道多才子自嘆遭逢似我稀所謂故人蓋斥其友歸𨼆者文穆有大第在洛中真宗祠汾時車駕幸止其㕔後人不敢復坐圍以欄楯設御榻焉即今張文孝公宅是也張文孝公觀以真宗幸亳嵗狀元及第致仕樞密副使而其父尚無恙父名居業周易學究性友弟滯選調三十餘年年六十餘始轉京秩以主客員外郎致仕見其子入踐樞府授大府卿壽九十卒卒未逾年張公亦捐館故諡文孝乃知張公貴達皆其父福慶所致李文正公昉深州饒陽人太祖在周朝已知其名及即位用以為相常語昉曰卿在先朝未嘗傾陷一人可謂善人君子故太宗遇昉亦厚年老罷相每曲宴必宣赴賜坐昉嘗獻詩曰微臣自愧頭如雪也向鈞天侍玉皇昉詩務淺切效白樂天體晚年與參政李公至為唱和友而李公詩格亦相類今世傳二李唱和集是也公有第在京城北家法尤嚴凡子孫在京守官者俸錢皆不得私用與饒陽莊課併輸宅庫月均給之故孤遺房分皆獲沾濟世所難及也有子宗諤仕至翰林學士篇什筆札兩皆精妙太宗朝嘗以京官帶館職赴內宴閣門拒之宗諤獻詩曰戴了宫花賦了詩不容重覩赭黃衣無聊獨出金門去恰似當年下第歸蓋宗諤嘗舉進士御試下第故詩因及之太宗即時宣召赴坐後遂為例雖選人帶職亦預內宴自宗諤始也王文正公旦相真宗僅二十年時值四方納欵海內無事天書荐降祥瑞沓臻而大駕封岱祠汾皆為儀衛使扈蹕處士魏野獻詩曰太平宰相年年出君在中書十四秋西祀東封俱已畢可能來伴赤松遊世傳真宗任旦為相常倚以決事故歐陽少師撰旦神道碑銘曰國有大事事有大疑匪卜匪筮公為蓍龜公雖荷真宗眷委之重每慎密逺權以自防故君臣之間略無纎隙可窺公與楊文公億為空門友楊公謫汝州公適當軸每音問不及他事唯談論真諦而已余嘗見楊公親筆與公云山栗一稱聊表村信蓋汝唯産栗而億與王公忘形以一稱栗遺之斯亦昔人雞黍縞紵之意也世傳王公嘗記前世為僧與唐房太尉事頗相類及將捐館遺命剃髮以僧服斂家人不欲止以緇褐一襲納諸棺而已然公風骨清峭頃項微結喉有僧相人皆謂其寒薄獨一善相者目之曰公名位俱極但祿氣不豐耳故旦雖位極一品而飲啖全少不畜聲伎晚年移疾在告真宗嘗密齎白金五千兩旦表謝曰已恨多藏况無用處竟不受之其清苦如此彭齊吉州人才辨滑稽無與為對未第時常謁南豐宰而宰不喜士平居未嘗展禮一夕虎入縣廨嘻所畜羊棄殘而去宰即以㑹客彭亦預翌日彭獻詩謝之曰昨夜黃斑入縣來分明踪跡印蒼苔幾多道德驅難去些子猪羊引便來令尹聲聲言有過録公口口道無災思量也解開東閣留取頭蹄設秀才南方謂押司録事為録公覽者無不絶倒齊以大中祥符元年姚曄下及第仕至太常博士卒陳亞揚州人仕至太常少卿年七十卒蓋近世滑稽之雄也嘗著藥名詩百餘首行於世若風月前湖近軒窗半夏凉棊怕臘寒呵子下衣嫌春暖宿紗裁及贈祈雨僧云無雨若還過半夏和師晒作葫蘆豝之類極為膾炙又嘗知祥符縣親故多借車馬亞亦作藥名詩曰地居京界足親知借借尋常無歇時但看車前牛領上十家皮沒五家皮覽者無不絶倒亞常言藥名用於詩無所不可而斡運曲折使各中理在人之智思耳或曰延胡索可用乎亞曰可沉思久之因朗吟曰布袍袖裏懷漫刺到處遷延胡索人此可贈游謁窮措大聞者莫不大笑亞與章郇公同年友善郇公當軸將用之而為言者所抑亞作藥名生查子陳情獻之曰朝廷數擢賢旋占凌霄路自是鬱陶人險難無移處也知沒藥療饑寒食薄何相誤大幅紙連粘甘草歸田賦亞又别成藥名生查子閨情三首其一曰相思意已深白紙書難足字字苦參商故要檳郎讀分明記得約當歸逺至櫻桃熟何事菊花時猶未回鄉曲其二曰小院雨其凉石竹生風砌罷扇儘從容半下紗厨睡起來間坐北亭中滴盡真珠淚為念壻辛勤去折蟾宫桂其三曰浪蕩去未來躑躅花頻換可惜石榴裙蘭麝香銷半琵琶間抱理相思必撥朱弦斷擬續斷來弦待這寃家看亞又自為亞字謎曰若教有口便啞且要無心為惡中間全沒肚腸外面強生稜角此雖一時俳諧之詞然所寄興亦有深意亞又别有詩百餘首號澄源集有嵗旦示知己云收寒歸地底表老向人間又與友人郊遊云馬嘶曾到寺犬吠乍行村送歸化宰王祕丞赴闕云吏辭如賀日民送似迎時懷舊𨼆云排聨花品曽非僣愛惜苔錢不是慳亦自成一家體格亞性寬和纍典名藩皆有遺愛然頗真率無威儀吏不甚懼行坐常弄瓢子不離懷袖尤喜唱清和樂知越州時每擁騎自衙庭出或由鑑湖緩轡而歸必敲鐙代拍潜唱徹三十六遍然後已亦其性也郎中曹琰亦滑稽辨捷嘗有僧以詩卷投獻琰閲其首篇登潤州甘露閣云下觀揚子小琰曰何不道卑吠狗兒肥次又閲一篇送僧云猿啼旅思悽琰曰何不道犬吠張三嫂座中無不大笑龍圖劉曄亦滑稽辨捷嘗與內相劉筠聚㑹飲茗問左右曰湯滚也未左右皆應曰已滚筠曰僉曰鯀哉曄應聲曰吾與㸃也曄又嘗與筠連騎趨朝筠馬病足行遲曄謂曰馬何故遲筠曰只為五更三言㸃蹄也曄應聲曰何不與他七上八意欲下馬徒行也青箱雜記卷一
