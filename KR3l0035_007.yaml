body:
  text: 青箱雜記卷七宋吳處厚撰謠䜟之語在洪範五行謂之詩妖言不從之罰前世多有之而近世亦有焉昔徐溫子知訓在廣陵作紅漆柄骨朵選牙隊百餘人執以前導謂之朱蒜天祐末廣陵人競服短袴謂之不及秋後十三年六月知訓為朱瑾所殺焉則朱蒜不及秋之應也李忭先為徐溫養子冒徐姓名知誥為升州刺史童謡曰東海鯉魚飛上天後竟即僞位李璟時朝中大臣多𬞞食月為十齊至明日大官具晚膳始復常珍謂之半堂食其後周師至淮上取濠泗揚楚泰五州而璟又割獻滁和廬舒蘄黃六州果去唐國土疆之半則半堂食之應也王衍在蜀好私行恐人識之令民戴大帽又令民戴危腦帽狹小鋭首即墜又衍朝永陵自為尖巾士民皆效之皆服妖也又每宴怡神亭妓妾皆衣道衣蓮花冠酒酣免冠髽髻為樂因夾臉連額渥以朱粉號曰醉粧此與梁冀孫壽事頗相類後衍又與母同禱青城山宫人畢從皆衣雲霞畫衣衍自製甘州詞令宫人歌之聞者悽愴又衍造上清宫成塑𤣥元皇帝及唐諸帝像衍躬自薦享城中士女遊觀闐咽謂之闕唐魂後國亡歸唐至秦川驛遇害衍在蜀時童謡曰我有一帖藥其名為阿魏賣與十八子其後衍兄宗弼果賣國歸唐而宗弼乃王建養子本姓魏氏此其應也衍舅徐延瓊造第新成衍幸之見其華麗乃於㕔壁大書一孟字蓋蜀人謂孟為弱以戲之也其後孟知祥入蜀館于其第見之嘆曰此豈我之居乎遂據蜀而王傳位至子昶國除昶未亡時蜀人質錢取息者每將徙居必榜其門曰召主收贖蓋周世宗纍欲收蜀而不果至我太祖乃收之此其應也廣南劉龑初開國營搆宫室得石䜟有古十六其文曰人人有一山山值牛兔絲吞骨蓋海承劉解者云人人有一大人也山山出也值牛者龑建漢國嵗在丑也兔絲者晟襲位嵗在卯也吞骨者滅諸弟也越人以天水為趙為蓋海指皇朝國姓也承劉者言受劉氏降也又乾和中童謠曰羊二四日天雨至解者以羊是未之神是嵗辛未二月四日國亡天雨猶天水斥國姓又日寶末有稻田自海中浮來上魚藻門外民聚觀之布衣林楚材見而歎曰水魚湫湫兮當時好事或有記其語洎王師至潘美為部署方悟為潘字光啓中陳巖為福建觀察使童謡曰潮水來山嚴沒潮水去矢口出其後王潮果代巖而審知襲位乃其應也時又有謠曰騎馬來騎馬去蓋光啓丙午國亡之應也王審知治城城有錢文惡之命剗去而其文愈明又有謡曰風吹楊葉鼓山下不得錢來兵不罷後福州軍校李仁福殺帥自立而歸欵於金陵既而又叛李璟璟攻之仁福又求救於錢塘比錢塘兵至而江南圍解獲其將楊匡業乃其應也唐末劉建峯定長沙遣馬殷領衆浚城濠得石碣有古十八其文曰龍舉頭猳掉尾羊為兄猴作弟羊歸穴猴離次解者以殷乾寧三年丙辰嵗代立乃龍舉頭也至乾祐辛亥嵗國亡乃猳掉尾也殷子希範以己未嵗生又以開運丁未嵗薨乃羊歸穴也又子希崇壬申嵗生後為江南所俘乃猴離次也又馬希振亦殷之子清泰中卒葬長沙之陶浦掘得石碣其文曰亂石之壤絶世之岡谷變庚戌馬氏無王蓋馬氏諸王雄於周廣順辛亥嵗遷于江南然其國之變實在庚戌嵗故也劉言世為馬氏宿將節度郎州號劉咬牙及馬氏將亂民間謠曰馬去也不用鞭咬牙過今年其後邊鎬入長沙盡俘諸馬歸於金陵而鎬亦為王逵所逐言是嵗亦為潘叔嗣所殺皆其應也龎巨昭善星緯之學唐末為容州刺史惡劉𨼆殘虐乃歸長沙或問湖南與淮南國祚短長巨昭曰吾入境來聞童謡曰三羊五馬馬闕離羣羊子無舍自今以後馬氏當五主楊氏當三主後皆如其言唐末丹陽民常戲語曰待錢來待錢來及後錢鏐授鎮海軍節度浙江西道觀察處置使潤州刺史遂據有錢塘乃其應也徐鉉父延休博物多學嘗事徐溫為義興縣令縣有後漢太尉許馘廟廟碑即許劭記嵗久字多磨滅至開元中許氏諸孫重刻之碑隂有八字云談馬礪畢王田數七時人不能曉延休一見為解之曰談馬言午言午許字礪畢石卑石卑碑字王田乃千里千里重字數七是六一六一立字此亦楊修辨虀臼之比也詩以言志言以知物信不誣矣江南李觀通經術有文章應大科召試第一嘗作詩曰人言日落是天涯望極天涯不見家堪恨碧山相掩映碧山還𬒳暮雲遮識者曰觀此詩意此有重重障礙李君恐時命不偶後竟如其言闕陳文惠公未逢時嘗作詩曰千里好山雲乍斂一樓明月雨初晴觀此意與李君異矣然則文惠致位宰相壽餘八十不亦宜乎宋莒公庠知許州開西湖詩曰鑿開魚鳥忘情地展盡江湖極目天識者觀詩意則知公位極一品矣孟郊下第詩曰棄置復棄置情如刀劒傷又甫及第詩曰昔日齪齪不足嗟今朝曠蕩思無涯青春得意馬蹄疾一日看盡長安花大凡進取得失蓋亦常事而郊器宇不宏偶一下第則其情隕穫如傷刀劒以至下淚既後登科則其中充溢若無所容一日之間花即看盡何其速也後郊授溧陽尉竟死焉丞相劉公沆廬陵人少以氣義嘗詠牡丹詩云三月內方有百花中更無述懷詩云虎生三日便窺牛獵食寧能掉尾求若不去登黃閣貴便須來伴赤松游奴顔婢舌誠堪恥羊狠狼貪自合羞三尺太阿星斗煥何時去取魏齊頭皇祐初公出領豫章轉運使潘風素有詩名乃以小孤山四十字示公公即席和呈文不加㸃詩曰擎天有八柱一柱此焉存石聳千尋勢波留四面㾗江湖中作鎮風浪裏蟠根平地安然者饒他五嶽尊覽者皆知公有宰相器矣未幾參大政遂正鼎席寇萊公少時作詩曰去海止十里過山應萬重及貶至雷州吏呈州圗問州去海幾里對曰十里則南遷之禍前詩已預䜟也乖崖張公詠晚年典淮陽郡遊趙氏西園作詩曰方信承平無一事淮陽間殺老尚書後一年捐館亦詩䜟也蘇緘字宣甫性忠義喜功名皇祐中以祕書丞知英州值儂賊作亂他州皆不能守獨緘捍禦有功恩換閣職尋坐事貶房州司馬嘉祐中復官權知越州諸暨縣余與之同僚常贈緘詩曰燕頷將軍欲白頭昔年忠勇動南州心如鐡石老不挫功在桑榆晚可收後十有八年緘如雍管交趾叛攻城力戰陷殁朝廷憫之贈奉國軍節度使賜諡忠勇則所謂忠勇之諡已先於余詩䜟之矣本朝翰林蘇公紳嘗題潤州金山寺一聨云僧依玉鑑光中住人踏金鼇背上行時公方舉大科識者以人踏金鼇背上行乃榮入玉堂之兆已而果然公位止於內相豈亦詩之䜟耶王丞相隨刻意於詩以謂詩皆言志不可容易而作嘗有應制科人成鋭集詩三篇國子博士侯君以獻於隨隨覽之乃親筆尺牘答侯君其略曰隨拜啓伏承賢良成秀才見訪不及裁製三冊文華宏逸學術該贍然覽舒菊詩云綵檻應無分春風不借恩又野花詩云馨香雖有豔栽植未逢人實皆綺靡之辭未協榮登之兆復閲别隨州裴員外嘉句云慿髙看漸逺更上最髙樓諒惟再舉合踐髙科其好品藻如此鋭許州臨頴人後以獻邊事得官竟坐闕斥餒死于京師白居易賦性曠逺其詩曰無事日月長不羇天地濶此曠達者之詞也孟郊賦性𥚹隘其詩曰出門即有礙誰謂天地寬此𥚹隘者之詞也然則天地又何嘗礙郊孟郊自礙耳王文康公賦性質實重厚作詩曰棗花至小能成實桑葉惟柔解吐絲堪笑牡丹如斗大不成一事只空枝此亦質實重厚之詞也檢正官張諤家起亭名允中蓋取易允升義後諤遷太子中允停官或者解曰允中亭者官至中允而後必停也太子中書舍人陳有方知蘄水縣臨水創亭名必觀蓋取荀况君子必觀於水之義或者解曰必觀亭者必停官也後有方竟以罪免官而去青箱雜記卷七
