body:
  text: 青箱雜記卷八宋吳處厚撰文章純古不害其為邪文章艷麗亦不害其為正然世或見人文章鋪陳仁義道德便謂之正人君子及花草月露便謂之邪人兹亦不盡也皮日休曰余嘗慕宋璟之為相疑其鐡腸與石心不解吐婉媚辭及覩其文而有梅花賦清便富艷得南朝徐庾體然余觀近世所謂正人端士者亦皆有艷麗之詞如前世宋璟之比今並録之乖崖張公詠席上贈官妓小英歌曰天教摶百花作小英明如花住近桃花坊北面門庭掩映如仙家美人宜稱言不得龍腦薰衣香入骨維陽軟縠如雲英亳郡輕紗似蟬翼我疑天上婺女星之精偷入筵中名小英又疑王母侍兒初失意摘向人間為飲妓不然何得膚如紅玉初碾成眼似秋波雙臉橫舞態因風欲飛去歌聲遏雲長且清有時歌罷下香砌幾人魂魄遙相驚人看小英心已足我見小英心未足為我髙歌送一杯我今贈汝新翻曲韓魏公晚年鎮北州一日病起作點絳唇小詞曰病起厭厭畫堂花謝添憔悴亂紅飄砌滴盡胭脂淚惆悵前春誰向花前醉愁無際武陵回睇人逺波空翠司馬溫公亦嘗作阮郎歸小詞曰漁舟容易入春山仙家日月間綺窗紗幌映朱顔相逢醉夢間松露冷海霞殷匆匆整棹還落花寂寂水潺潺重尋此路難又曾修古立朝最號剛方蹇諤常見池上有所似者亦作小詩寓意曰荷葉罩芙蓉圎青映嫩紅佳人南陌上翠蓋立春風王安國作詩多使酒樓嘗語余曰楊文公詩有江南一酒樓堤栁拂人頭李白題詩遍酒樓錢昭度詩亦有酒樓長憶錢塘江上望酒樓人散雨千絲子詩有幾酒樓余答曰吾詩有二酒樓安國曰足矣蓋余有題九江琵琶亭小詩云夜泊潯陽宿酒樓琵琶亭畔荻花秋雲沉鳥沒事已往月白清風江自流又余昔年嘗送客西陵亦作小詩曰若耶溪畔醉秋風獵獵船旗照水紅後夜錢塘酒樓上夢魂應繞浙江東安國俊邁而貌陋黑肥熙寧中與余同官于洛下嘗謂余曰子可作詩贈我余因援筆戲之曰飛卿昔號溫鍾蕞思道通俯還魁肥江淹善啖筆五色庾信能文腰十圍只知外貌之粉澤誰料滿腹填珠璣相逢把酒洛陽社不管淋漓身上衣安國由此不恱畢文簡公之壻曰皇甫泌少時不羇唯事蒲博時畢公作相纍諭不悛欲面奏其事使加貶斥方啓口云臣有女壻皇甫泌適值過庭有急報不暇敷陳他日又欲面奏亦如之若是者三值上內逼遽引袖起遙語畢曰卿纍言壻皇甫泌得非欲轉官耶可與轉一資畢公不敢辨唯而退泌即轉殿中丞後纍典大郡以尚書右丞致仕年八十五卒嘉祐中選人鄭可度厯十五考舉主僅滿五人內一人乃州北李少卿昭選待次二年餘引見前一夕五更昭選卒其日值起居朝堂中歡言州北李少卿夜來有事銓吏知之即以撼可度願得錢五千寢其事可度不與吏竟白銓主再會問罷引可度遂老死選調又選人張方闕賦性剛介嘗以事忤上官為所羅織以贓罪廢絶無改轉之望後為臨頴令時賈安公知許州憐其無辜即為奏雪罷任舉主亦僅滿磨勘入甲待次餘二年將引見又丁家艱及服除謂舉主雕喪已盡則闕會問乃並存轉著作佐郎至今無恙此又與鄭可度不侔矣樞密孫公抃生數日患臍風已不救家人乃盛以盤合將棄諸江道遇老媼曰兒可活即與俱歸以艾炷炙臍下遂活海有魚虬尾似鴟用以噴浪則降雨漢柏梁臺災越王上厭勝之法乃大起建章宫遂設鴟魚之像於屋脊以厭火災即今世之鴟吻是也春秋左氏傳稱三叛人以土地出求食而已賤而書名蓋甚之則以其無廉恥之至也故今倡家謂之求食蓋本乎此唐以前館驛並給傳往來開元中務從簡便方給驛劵驛之給劵自此始也曲有録要者録霓裳羽衣曲之要拍即唐書吐蕃傳所謂涼州胡謂録要雜曲而今世語訛謂之録要梁髙祖為宣武節帥及受禪乃升汴州為開封府其詔曰興王之地受命之邦集大勳有異庶方沾慶澤所宜加厚故豐沛著啓祚之美襄鄧有建都之榮用壯鴻基且旌故里則汴州為開封府自朱梁時也天清寺繁臺本梁王鼓吹臺梁髙祖常閲武於此改為講武臺其後繁氏居其側里人乃呼為繁臺則繁臺之名始於此也左氏傳曰魏大名也故魏府號大名府考工記栗氏掌攻金其量銘曰時文思索故今世攻作之所號文思院蘇有姑蘇臺故蘇州謂之蘇臺相有銅雀臺故相州謂之相臺滑有測景臺故滑州謂之滑臺王禹稱徙蘄州到任謝上表曰宣室鬼神之問敢望生還茂陵封禪之文已期身後李淑到河中府謝上表曰長安日逺戴盆之望徒深宣室夜闌前席之期不再王陶再來河南府謝上表曰田園僅足二疏那見其復來羽翼已成四皓寧聞於再起三公表意一同到任未幾皆卒景德中河朔舉人皆以防城得官而范昭作狀元張存任并雖事業荒踈亦皆𬒳澤時有無名子嘲曰張存解放旋風炮任并能燒猛火油存後仕尚書并亦仕至屯田員外郎知要州卒慶厯丙戌嵗春榜省試以民功曰庸為賦題題面生梗難為措詞其時路授饒瑄各場屋馳名路則云此賦須本賞饒則云此賦須本農故當時無名子嘲曰路授則家住關西打賞罵賞饒瑄則生居浙右你儂我儂本朝大官最享髙年者凡三人曰太傅張公士遜樞相張公升少師趙公槩皆壽至八十六又二人次之曰陳文惠公堯佐至八十二杜祁公衍至八十一又一人次之曰富文忠公弼壽至八十餘皆不及焉故文惠致政以詩寄太傅曰青雲岐路遊將遍白髮光隂得最多蓋為是也太傅張公光化軍人生百日始能啼襁褓中喪其父母少孤貧讀書武當山有道士見而異之曰子有道氣可隨我學仙公不欲道士亦弗強曰不然亦位極人臣公以淳化三年孫何下及第久困選調年幾五十始轉著作佐郎知邵武縣還朝以文贄楊公大年比三日至門下連值楊公與同輩打葉子門吏不敢通公亦弗去楊公忽自窗隙目之知非常人延入欵語又觀所為文以為有宰相器未幾薦為御史尋充受春王友由此附會遂登台輔然公寬厚長者記存故舊嘗與邵武姓魚一僧相善及貴猶不忘為魚奏紫方袍弟子守仙亦沾錫服晚年致政猶時時遺守仙物不絶答書皆親筆書語皆稠疊勤拳其敦篤如此公性喜山水宰邵武時多遊僧舍至則吟哦忘歸嘗至西庵寺題詩曰西庵深入西山裏算得當年少客遊密密石叢盤小徑涓涓雲竇瀉寒流松皆有節誰青蓋僧盡無心也白頭欲刷粉牌書姓字調卑官冗不堪留又公嘗至寶蓋巖寺亦留題曰身為冠冕留心是雲泉客每到雲泉中便擬忘歸迹况兹寶蓋巖天造清涼宅稅車官道邊誰知願言適又公嘗公牒至建寧縣道洛陽村而山路險峭穹絶不可名狀亦題二韻於村寺曰金谷花時醉幾場舊遊無日不思量誰知萬水千山裏枉𬒳人言過洛陽仁宗篤師傅恩遇公特厚致政後每大朝會常令綴兩府班公時已八十餘而拜跪尚輕利仁宗恱乃飛白千嵗二字賜之公遽進歌以謝優詔答之雖漢顯宗之遇桓榮不是過也樞相張公升字杲卿陽翟人大中祥符八年蔡齊下及第仕亦晚達皇祐中自潤州解官時已六十餘語三命僧化成曰運限恰好去未得未幾除侍御史知雜事不十年作樞相退歸陽翟生計不豐短㲲輕滌翛然自適乃結庵於嵩陽紫虛谷每旦晨起焚香讀華嚴庵中無長物荻簾紙帳布被革履而已年八十餘自撰滿江紅一首聞者莫不慕其曠達詞曰無利無名無榮無辱無煩無惱夜燈前獨歌獨酌獨吟獨笑况值羣山初雪滿又明月交光好便假饒百嵗擬如何從他老知富貴誰能保知功業何時了算簞瓢金玉所爭多少一瞬光隂何足道但思行樂常不早待春來擕酒殢東風眠芳草少師趙公槩字叔平天聖初王堯臣下第三人及第為人寬厚長者留滯內相十餘年晚始大用參二大政治平中退老睢陽素與歐陽文忠公友善時文忠退居東潁公即自睢陽乘興拿舟訪之文忠喜公之來特為展宴而潁守翰林吕公亦預會文忠乃自為口號一聨云金馬玉堂三學士清風明月兩間人兩間人謂公與文忠也青箱雜記卷八
