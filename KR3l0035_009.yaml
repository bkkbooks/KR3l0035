body:
  text: 青箱雜記卷九宋吳處厚撰楊文公談苑稱楚僧惠崇工詩於近代釋子中為傑出而歐陽公少師歸田録亦紀其佳句則不甚多余嘗見惠崇自撰句圗凡一百聨皆平生所得於心而可喜者今並録之書楊雲卿别墅云河分岡勢斷春入燒痕青長信詞云隂井生秋早明河轉曙遲送逺上人西遊云地形吞蜀盡江勢抱蠻回江行晚泊云嶺暮春猿急江寒白鳥稀上谷相公池上作云歸禽動踈竹落果響寒塘贈陳六府云野人傳相鶴山吏學彈琴夜坐云香淺氷生井宵分月上軒贈凝上人云掩門青檜老出定白髭長送選客云浪經蛟浦濶山入鬼門寒經緣公舊寺云遺偈傳諸國留真在一峯塞上云河氷堅度馬塞雪密藏鵰喜長公至云久别年顔改相逢夜話長𨼆者云多年不道姓幾日旋移家宿東林寺云鳥歸杉墮雪僧定石沉雲上翰林楊學士云露寒金掌重天近玉繩低栁氏書齊云著書驚日短彈劒惜春深上王太尉云探騎通畨壘降兵逐漢旗田家秋夕云露下牛羊靜河明桑柘空舟行云林斷城隍出江分島嶼回寄梅蘇州云鎖城山月上吹角海鷗驚宿楊侍郎東亭云卷幔來風逺移牀得月多送程至云白浪分吳國青山隔楚天遊𨼆靜寺云空潭聞鹿飲踈𣗳見僧行送錢供奉巡警云劒佩明山雪旌旗濕海雲梅鼎臣河亭云曠野行人少長河去鳥平宿肇公山齊云月髙山舍逈霜落石門深送盧經西歸云霜多秦木逈雲盡漢山孤濠梁夜泊云夜間潮動舸秋逈月臨城崔仰秋居云葉落風中盡蟲聲月下多贈裴使君云行縣山迎舸論兵雲繞旗早行云繁霜衣上積殘月馬前低秋夕云磬斷蟲聲出峰回鶴影沉書韓退之屋壁云移家臨醜石租地得靈泉秋夕懷長公云秋近草蟲亂夜遙霜月低觀宴鄉老云海鷗聽舜樂山鬼醉堯觴贈素上人云中食下林狖夜禪移塜狐晚夏云扇聲猶泛暑井氣忽生秋江行早發云殘月楚山曉孤煙江廟春宿翻經館清少卿房云梵容分古像唐語入新經題王大保道院云鶴傳滄海信僧和白雲詩秋夕懷汪白詩云寒禽栖古栁破月入微雲贈白上人云花漏沉山月雲衣起海風喜陳助至云樓中天姥月座上杜陵人冬日野望云人歸岡舍逈鴈過渚田遙送人牧榮州云山色臨巴逈江流入漢清春申道中云湘雲隨鴈斷楚路背人遙贈李道士云松風吹髮亂嵓溜濺碁寒栖霞寺云境間僧度水雲盡鶴盤空林逋河亭云古路隨岡起秋帆轉浦斜楊祕監池上云禽寒時動竹露重忽翻荷魏野山亭云嵐重琴碁濕風長枕簟寒塞下云離磧鴈衝雪渡河人上氷寄白閣能上人云夜梵通雲竇秋香滿石叢陜西道中云關河雙鬢白風雪一燈青送防秋楊將軍云殺氣生龍劒威風動虎旗瓜州亭子云落潮鳴下岸飛雨暗中峯賀劉舍人云日纒黃道逈春入紫微深除夜云寒燈催臘盡曉角喚春歸幽并道中云鴈行沈古戍鵰影轉寒沙送僧歸天台云景霽雲回合秋生𣗳動搖過陳搏舊居云亂水僧頻過荒林鶴不還宿橫江館云露館濤驚枕空庭月伴琴維邢道中云馬渡氷河濶鵰盤噴日髙國清寺秋居云驚蟬移古栁鬬雀墮寒庭書平上人山房云松風傳夕磬溪霧擁春燈觀南郊天仗云霓旌搖曙景鳯吹繞春雲贈義省上人云坐石雲生袖添泉月入瓶升平詞云萬國無刑治三邊不戰平國清寺云暝鶴棲金剎秋僧過石橋吕氏西齊云雲殘僧掃石風動鶴歸松劉參幽居云風暖鳥巢木日髙人灌園楊都官池上云竹風驚宿鶴潭月戲春鷖書矯方屋壁云圭竇先知曉盆池别見天送陳舍人巡撫云月露踈寒柝雲濤閃畫旗宿齊上人禪齊云鶴驚金剎露龍蟄玉瓶泉春日寇宫贊池上云暄風生木末遲景入泉心七夕云河來天上濶雲度月邊輕贈王道士云海人來相鶴山狖下聽琴送孫荆州云畫鷁浮秋浪金鐃響夕雲江城晚望云丹楓映郭逈緑嶼背江深題王太保山亭云危溜含清瑟飛花㸃玉觴送李秦州云朱旗凌雪卷畫角入雲吹晝上人西齊云孤雲還靜境逺籟發秋空李太博山莊云圍碁分雪石汲井動金沙宫中詞云井含春氣碧樓轉夕隂清送吳𡊮州云鳥暝風沉角天清月上旗寄肇公云斜吹鳴金鍚歸雲擁石牀塞上云古戍生煙直平沙落日遲嗣上人云拂石雲離帚嘗茶月入鐺舟行云逺嶼迎檣出寒林帶岸回送延上人云來時雲擁衲别夜月隨笻馬蠙淮亭云路橫岡燒斷風轉浦帆斜上殿前戴太保云劒靜龍歸匣旗間虎繞竿髙諲書齊云品畫逢名嶽橫琴憶古賢太一山云雲隂移漢塞石色入秦天塞上送人云地遙羣馬小天濶一鵰平范溶園池云江花凌霰發山溜入池深獵騎云長風躍馬路小雪射鵰天髙略書院云古木風煙盡寒潭星斗深送段工部河北轉運云渡河風動斾巡部雨霑車神宗朝皇嗣屢闕余嘗詣閣門上書乞立程嬰公孫杵臼廟優加封爵以旌忠義庶幾鬼不為厲使國統有繼是時適值鄆王服藥上覽之矍然即批付中書授臣將作監丞敕河東路訪尋二人遺迹乃得其家於絳州太平縣詔封嬰為成信侯杵臼為忠智侯因命絳州立廟嵗時致祭余所上書略曰臣嘗讀史記世家考趙氏廢興之本末惟程嬰公孫杵臼二人各盡死不顧難以保全趙氏孤兒最為忠義乃知國家傳祚至今皆二人之力也蓋下宫之難屠岸賈殺趙朔趙同趙括趙嬰齊已赤族無噍類惟朔妻有遺腹匿於公宫既而免身生男屠岸賈聞知索於宫中甚急於是朔妻置男袴中祝曰趙宗滅乎若無聲及索兒竟無聲乃得脫然則兒之無聲蓋天有所祚且天方啓趙氏生聖人以革五代之亂拯天下於湯火之中而奄有焉使聖子神孫繼繼承承而不已則兒又安敢有聲蓋有聲則不免不免則趙氏無復今日矣然雖天祚亦必賴公孫杵臼謬負他嬰匿於山中卒與俱死以絶其後患又必賴程嬰保持其孤遂至成人而立之以續趙祀即趙武子也於是趙宗復盛傳十世至武靈王而遂以山河與秦俱霸其後為秦所併則子孫蕩析散居民間今常山真定中山則古之趙地也故趙氏世為保州人而僖祖順祖翼祖宣祖皆生於河朔以至太祖啓運太宗承祧真宗紹休仁宗守成英宗繼統陛下纘業嚮使趙氏無此二人以力衛襁褓孑然之孤使得以全則承祀無遺育矣又安能昌熾以至於此故臣深以謂國家傳祚至今皆二人之力也二人死皆以義甚可悼痛雖當時趙武為嬰服喪三年為之祭奠春秋祠之世勿絶然今不知其祠之所在竊慮其祠或廢而弗舉或舉而弗葺而弗封三者皆闕典也左氏曰鬼有所歸乃不為厲自宋有天下甲子百二十二年于兹矣而二人忠義未見褒表廟食弗顯故仁宗在位厯年至多而前星不耀儲嗣屢闕雖天命將啓先帝以授陛下然或慮二人精魄久無所歸而亦因是為厲也何哉蓋二人能保趙孤使趙宗復續其德甚厚則趙宗之續國統之繼皆自二人為之也况二人者忠誠精剛洞貫天地則其魂常遊於天空而百世不滅臣今欲朝廷指揮下河東北晉趙分域之內訪求二人墓廟特加封爵旌表如或自來未立廟貌即速令如法崇建著於甲令永為典祀如此則忠義有勸亦可見聖朝不負於二人者矣龍圗燕公肅雅多巧思任梓潼日嘗作蓮花漏獻於闕下後作藩青社出守東潁悉按其法而為之其制為四分之壺參差置水器於上刻木為四方之箭箭四觚面二十五刻刻六十四面百刻總六千分以效日凡四十八箭一氣一易鑄金蓮承箭銅烏引水下注金蓮浮箭而上有司唯謹視而易之其行漏之始又依周官水地置泉法考二交之景得午時四刻一十分午為正南北景中以起漏焉以梓潼在南其法晝增一刻夜損一刻青社稍北晝增三刻潁處梓青之間晝增二刻夜損亦如之仍作宣祕漏其德天愈密焉兹亦張平子之流也本朝之制誥待制止繫皂鞓犀帶遷龍圗閣直學士始賜金帶燕公為待制十年不遷乃作陳情詩上時宰曰鬢邊今日白腰下幾時黃於是時宰憐其老未幾遷直學士燕公登科最晚年四十六始用寇萊公薦轉京官晚登文館列侍從作直學士時已六十餘矣青箱雜記卷九
