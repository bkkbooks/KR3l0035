body:
  text: 青箱雜記卷五宋吳處厚撰小說載盧樵貌陋嘗以文章謁韋宙韋氏子弟多肆輕侮宙語之曰盧雖人物不揚然觀其文章有首尾異日必貴後竟如其言本朝夏英公亦嘗以文章謁盛文肅文肅曰子文章有館閣氣異日必顯後亦如其言然余嘗究之文章雖皆出於心術而實有兩等有山林草野之文有朝廷臺閣之文山林草野之文則其氣枯槁憔悴乃道不得行著書立言者之所尚也朝廷臺閣之文則其氣溫潤豐縟乃得位於時演綸視草者之所尚也故本朝楊大年宋宣獻宋莒公胡武平所撰制詔皆婉美淳厚過於前世燕許韋楊逺甚而其為人亦各類其文章王安國常語余曰文章格調須是官樣豈安國言官樣亦謂有館閣氣耶又今世樂藝亦有兩般格調若朝廟供應則忌粗野嘲􅑜至於村歌社舞則又喜焉兹亦與文章相類晏元獻公雖起田里而文章富貴出於天然嘗覽李慶孫富貴曲云軸裝曲譜金書字𣗳記花名玉牌公曰此乃乞兒相未嘗諳富貴者故余每吟咏富貴不言金玉錦繡而唯說其氣象若樓臺側畔楊花過簾幕中間燕子飛梨花院落溶溶月栁絮池塘淡淡風之類是也故公自以此句語人曰窮兒家有這景致也無公風骨清羸不喜肉食尤嫌肥羶每讀韋應物詩愛之曰全沒些脂膩氣故公於文章尤負賞識集梁文選以後迄于唐别為集選五卷而詩之選尤精凡格調猥俗而脂膩者皆不載也公之佳句宋莒公皆題於齊壁若無可奈何花落去似曾相識燕歸來靜尋啄木藏身處間見遊絲到地時樓臺冷落收燈夜門巷蕭條掃雪天已定復搖春水色似紅如白野棠花之類莒公常謂此數聨使後之詩人無復措詞也楊文公為執政所忌母病謁告不俟朝㫖徑歸韓城與弟倚居踰年不調公有啓謝朝中親友曰介推母子願歸綿上之田伯夷弟兄甘受首陽之餓後除知汝州而希㫖言事者攻擊不已公又有啓與親友曰已擠溝壑猶下石而弗休方困蒺藜尚關弓而相射范文正公幼孤隨母適朱氏因冒朱姓名說後復本姓以啓謝時宰曰志在投秦入境遂稱於張祿名非霸越乘舟乃效於陶朱以范睢范蠡亦嘗改姓名故也又僞蜀翰林學士范禹稱亦嘗冒張姓謝啓云昔年上第誤摽張祿之名今日故園復作范睢之裔然不若文正公之精切胡武平嘗奉敕撰溫成皇后哀冊文受㫖以溫成嘗因禁卒竊發捍衛有功而秉筆者不能文其實公乃用西漢馬何羅觸瑟馮媛當熊二事以狀其意曰在昔禁闈誰何弛衛觸瑟方警當熊已厲覽者無不嘆服夏文莊公竦幼負才藻超邁不羣時年十二有試公以放宫人賦者公援筆立成文不加㸃其略曰降鳯詔於丹陛出蛾眉於六宫夜雨未回儼鬢雲於簾戶秋風漸曉失叉燕於房櫳又曰莫不喜極如夢心搖若驚踟蹰而玉趾無力眄睞而橫波漸傾鸞鑑重開已有歸鴻之勢鳯笙將罷皆為别鶴之聲于時銀箭初殘瓊宫乍曉星眸爭别於天仗蓮臉競辭於庭沼行分而掖路深沉步緩而回廊繚繞嫦娥偷藥幾年而不出蟾宫遼鶴思家一旦而郤歸華表公舉制科庭對策罷方出殿門遇楊微之見其年少遽與語曰老夫他則不知唯喜吟咏願丐賢良一篇以卜他日之志不識可否公援筆欣然曰殿上衮衣明日月研中旌影動龍蛇縱橫禮樂三千字獨對丹墀日未斜楊公嘆服數四曰真將相器也景德中夏公初授館職時方早秋上夕宴後庭酒酣遽命中使詣公索新詞公問上在甚處中使曰在拱宸殿按舞公即抒思立進喜遷鶯詞曰霞散綺月沉鈎簾捲未央樓夜涼河漢截天流宫闕鎖新秋瑶階曙金莖露鳯髓香和雲霧三千珠翠擁宸遊水殿按梁州中使入奏上大恱夏公雖舉進士本無科名以父殁王事授潤州丹陽簿即上書乞應制舉其略曰邊障多故羽書旁午而先臣供傳遽之職立矢石之地忘家殉國失身行陳陛下哀臣孤幼任之州縣唯陛下辨而明之若陛下以枕石潄流為達臣世居市井若陛下以金榜丹桂為才則臣未忝科第若陛下以鳩杖鮐背為德則臣始踰弱冠若陛下以荷戈控弦為勇則臣生本綿弱若陛下令臣待詔公車條問急政對揚紫宸指陳時事猶可與漢唐諸儒方轡並驅而較其先後矣真廟再三賞激召赴中書試論六首一曰定四時别九州聖功孰大論二曰考定明堂制度論三曰光武二十八將功業先後論四曰九功九法為國何先論五曰舜無為禹勤事功業孰優論六曰曾參何以不列四科論是嵗遂中制科淮隂侯廟題者甚多惟諫議錢公昆最為絶唱曰築壇拜日恩雖厚躡足封時慮已深隆凖早知同鳥喙將軍應起五湖心徐州歌風臺題者甚多惟尚書張公方平最為絶唱曰落魄劉郎作帝歸樽前一曲大風辭才如信越猶俎醢安用思他猛士為臨潼縣華清宫朝元閣題者亦多惟陳文惠公二韻尤為絶唱曰朝元髙閣逈秋毫無𨼆情浮雲忽以蔽不見漁陽城蘇為酷嗜吟詠知湖州日有詩數十首惟一篇足為絶唱曰野艇間撑處湘天景亦微春波無限緑白鳥自南飛栁色濃垂岸山光冷照衣時携一壺酒戀到晚涼歸在宣城亦有詩十首皆以宣城為目內宣城花一首尤為清麗曰宣城花疊嶂樓前簇綺霞若非翠露陶潜栁即是紅藏小謝家又常知邵武軍亦有小詩十首唯一篇最善曰愛重八九月登髙闕下樓樹紅雲白處寒瀨泊魚舟唐路德延有孩兒詩五十韻盛傳於世近代洛中致政侍郎張公師錫追次其韻和成老兒詩亦五十韻合録之曰鬢髮盡皤然眉分白雪鮮周遮延客話傴僂抱孫憐無病常供粥非寒亦衣綿假溫推擁背借力仗搘肩貌比三峰客年過四皓仙喚方離枕上扶始到門前每愛烹山茗常嫌飣石蓮耳聾如塞纊眼暗似籠烟宴坐羸憑几乘騎困嚲鞭頭搖如轉旋唇動若抽牽骨冷愁離火牙疼怯潄泉形骸將就木囊槖尚貪錢膠睫乾眵綴粘髭冷涕懸披裘腰懶繫濯手袖慵揎擡舉衣頻喚扶持藥屢煎坐多茵易破行少履難穿喜婢裁裙布嗔妻買粉鈿房教深下幕牀遣厚鋪氈琴聽憐三樂圗張笑七賢看嫌經字小敲喜磬聲圎食罷羔流袂杯餘酒帶涎樂來須遣罷醫到久相延褁帽縱橫掠梳頭取次纒長吁思往事多感聽哀弦氣注腰還重風牽口便偏墓松先遣種志石預教鐫客到惟求藥僧來忽問禪養茶懸竈壁晒艾曝􅉉椽怒僕空睜眼嗔兒謾握拳心驚嫌蹴踘腳軟怕鞦韆局縮同寒狖摧豗似飽鳶觀瞻多目眩牽動即頭旋女嫁求紅燭男㛰乞彩錢已聞捐几杖寧更佩韋絃賓客身非與去聲兒孫事已傳養和屏作伴如意拂相連久棄登山屐惟存負郭田呻吟朝不樂展轉夜無眠呼稚臨床畔看書就枕邊冷疑懷貯水虛訝耳聞蟬束帛非無分安車信有緣伏生甘坐末絳老讓行先拘急將風夜昏沉欲雨天雞皮塵漸漬齯齒食頻填每憶居郎署常思釣渭川喜逢迎佛㑹羞赴賞花筵徑狹容移檻階危索減磚好生焚鳥網惡殺拆漁船既感桑榆日常嗟蒲栁年長思當弱冠悔不賸狂顛師錫年八十餘卒又有喜子及第詩曰御榜今朝至見名心始安爾能俱中第吾遂可休官賀客留連飲家書反覆看世科誰不繼得慰二親難蓋張嘗有中魁甲者故得有世科之語李昉吕端同踐文館後各登台輔吕公贈李公詩曰憶昔僦居明德坊官資俱是校書郎青衫共直昭文館白首同登政事堂佐國廟謨君已展避賢榮路我猶妨主恩至重何時報老眼相看淚兩行向敏中冦凖同以太平興國五年登科後向秉鈞寇以使相知永興軍向作絶句贈冦寇酬之曰玉殿登科四十年當時僚友盡英賢嵗寒惟有君兼我白首猶持將相權青箱雜記卷五
