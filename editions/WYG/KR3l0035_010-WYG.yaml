body:
  text: 青箱雜記卷十宋呉處厚撰真宗朝有王犍者汀州長汀人少時薄游江界至星子縣夜宿逆旅遇道士授黄白術未盡其要後再遇其人於茅山相擕至厯陽指示靈草并傳以合和密訣試皆有騐仍别付靈方環劒緘縢之書戒曰非遇人君慎勿輕述犍後以佯狂抵禁配流嶺南時供奉官閣門祇候謝得權適總巡兵頗聞其異犍後竄歸闕下徳權乃舘於私第錬成藥銀上進真宗異之命解軍籍使劉承珪詰其事犍以師戒甚嚴終不敢泄唯願見至尊面陳於是承珪乃為犍改名中正俾詣登聞始得召見即授許州散掾留止京師尋授神武將軍致仕仍給全俸遷髙州刺史康州團練使前後貢藥金銀累巨萬數輝彩絶異不𩔖世寳當時賜天下天慶觀金寳牌即其金所鑄也然中正亦不敢妄費唯周濟貧乏崇奉仙釋今汀州開元寺乃其施財所建也卒贈鎮南軍節度使此近古所未聞也乖崖張公詠尹益部日值李順兵火之後羣政未舉因謏一吏詞不伏公曰這莫要劒喫彼云謏不得喫劒則得公命斬之以狥軍吏愕眙相顧自是始服公威信李順黨中有殺耕牛避罪亡逸者公許其首身拘母十日不出釋之復拘其妻一宿而來公斷云禁母十夜留妻一宵倚門之望何踈結髪之情何厚舊為惡黨因又逃亡許令首身猶尚顧望就命斬之於是首身者繼至並遣歸業蜀民由此安居公平順賊之明年復有劉旴相繼叛命公命討平之既而凱旋忽有持首級來者公曰當奔突接戰之際豈暇獲其首此必戰後斫來知復是誰殿直段倫曰如學士之言真神明當時隨倫為先鋒入賊用命者皆中傷􅀍體何嘗獲首級公乃先録中傷之人而以持首級來者次之於是軍伍歡躍又皇祐中儂賊叛命狄青討之青臨行上言以謂古之師還以訊馘首告割耳鼻則有之不聞有獲首者秦漢以來方有是事故獲一首則賜爵一級因謂之首級然開爭啟倖莫此之甚故軍士爭首級以致相殺又其間多以首級為貨售於無功不戰之人非所以勸願一切寢罷如師有功則差次其勞全軍加賞無功則斟酌其罪全軍加罰庶令上下一心不專自為私計則决勝之道也從之遂大捷然則青之智識亦公之智識也公布衣時素善陳摶嘗因夜話謂摶曰某欲分先生華山一半住得無摶曰餘人則不可先輩則可及旦取别摶以宣毫十枝白雲臺墨一劑蜀牋一角為贈公謂摶曰㑹得先生意取某入閙處去曰珍重摶送公回謂弟子曰斯人無情於物達則為公卿不達為王者師公常感之後尹蜀乗傳過華隂寄摶詩曰性愚不肯林泉住強要青流擬致君今日星馳劒南去回頭慙愧華山雲公布衣時常至鄭州宿於逆旅遇一人氣貌甚古與之語曰塵外子不言姓氏自稱神和子質明為别語公曰他日相公候於益州後公典益部瘍生於首禱於龍興觀夜夢昔年神和子告之曰頭瘡勿疑不是死病及覺語道士文正之嘗收得鄭韶處士贈神和子歌因索而閱之益異其事公乃建大閣上下十四間號仙游閣歌至今刻石存焉公離蜀日以一幅書授蜀僧希白其上題須十年後開其後公薨于陳凶訃至蜀果十年啟封乃乖崖翁真子一幅戴𨼆士帽褐袍絹帶其傍題云依此様冩於仙游閣兼自撰乖崖翁真賛云乖則違衆崖不利物乖崖之名聊以表徳徒勞丹青繪冩凡質欲明此心服之無斁至今川民皆依様家家傳冩李復圭三世皆知滑州天聖中其祖康靖公若谷知慶厯中其父邯鄲公淑又知及後八年復圭又知前此邯鄲公嘗迎侍康靖題詩於州􅅟曰滑守如今是世官阿戎出守自金鑾郡人莫訝留題别孫息期同住此看後復圭刻䂖記其事一曰仰承詒訓允契冥兆兹亦異也劉沆與鄉人尹鑑少同場屋劉已登第大拜皇祐中尹以恩牓始登第還鄉劉以詩送之少年相欵老相逢鄉舉雖同遇不同我已位塵三事後君方名列五科中榮登莫計名髙下宦達須由善始終若到鄉關人見問為言歸思滿秋風仁宗朝内臣孫可久賦性恬澹年踰五十即乞致仕都下有居第堂北有小園城南有别墅每良辰美景以小車載酒優游自適石曼卿常過其居題詩曰南北沾河潤幽深在禁城疊山資逺意讓俸買閑名閉户斷蛛網折花移鳥聲誰人識髙趣朝𨼆石渠生屯田外郎栁永亦贈詩曰故侯幽𨼆直城東草𣗳扶踈一畞宫曾珥貂璫為近侍却紆絛褐作閑翁高吟擁鼻詩懐壯雅論盱衡道氣充厭盡繁華天上樂始將蹤蹟學􅁳鴻可久好吟詠效白樂天格嘗為陜西駐泊為樂天搆祠堂於郡城大阜之頂中安繪像仍繕冩平生謌詩警策之句徧於舊墉晩年著歸休集行於世年七十餘卒内臣裴愈字益之亦好吟詠真宗朝衘命江南搜訪遺書名畫歸奏稱㫖用是累居三舘秘閣職任有詩送魯秀才南遊云東呉山色家家月南楚江聲浦浦風聞蟬詩云楊栁影踈秋霽月梧桐葉墜夕陽天皆其佳句有子曰湘字楚老亦有詩名明道中仁宗御便殿試進士房心為明堂賦和氣致祥詩亦命湘賦之湘蹈舞再拜數刻而成仁宗嗟賞左右中人為之動色其和氣致祥詩曰君徳承天道冲融恊太和卿雲呈瑞早膏澤應時多煦集連枝木嘉扶異穎禾五星還聚井丹鳯更巢阿藪澤無遺士邊防久息戈黔􅀺逢至化稽首載􅆳歌他詩亦𩔖此有肯堂集行於世翰林李公淑為之作序曰予嘗嘉河東父子起銀璫右貂能以屬辭拔其倫益之三朝侍内老不廢學又課厲二子使皆有立約已慎履如周仁石慶而楚老孳孳嗜書克自淬琢云湘又喜為小詞嘗在河東路走馬承受有詠并門浪淘沙小詞云鴈塞說并門郡枕西汾山形髙下逺相吞古寺樓臺依碧障煙景遥分晉廟鏁溪雲簫鼓仍存牛羊斜日自歸村惟有故城禾􅁰地前事銷魂復有詠汴州浪淘沙小詞仁宗命録進亦嘉之其詞曰萬國仰神京禮樂縱横葱葱佳氣鏁龍城日御明堂天子聖朝㑹簮纓九陌六街平萬物充盈青樓絃管酒如渑别有隋堤煙栁暮千古含情楊文公深達性理精悟禪觀捐舘時作偈曰漚生復漚滅二法本來齊要識真歸處趙州東院西丞相王公隨亦悟性理捐舘時知河陽作偈曰畫堂燈已滅彈指向誰說去住本尋常春風掃殘雪是夕薨凌晨大雪實正月六日曹司封修睦深達性理知邵武軍時常以竹簟贈禪僧仁曉因作偈與之曰翠筠織簟寄禪齋半夜秋從枕底來若也此時人問道涼天捲却暑天開張尚書方平尤達性理有人問祖師西來意張作偈荅之曰自從無始千千刼萬法本來無一法祖師來意我不知一夜西風掃黄葉陳文惠公亦悟性理嘗至一古寺作偈曰殿古寒爐空流塵暗金碧獨坐偶無人又得真消息富文忠公尤達性理熈寧余官洛下公時為亳守遺余書記為訪荷澤諸禪師影像余因以偈戯之曰是身如泡幻盡非真實相况兹紙上影妄外更生妄到岸不須船無風休起浪唯當清靜觀妙法了無𧰼公荅偈曰執相誠非破相亦妄不執不破是名實相既又以手筆貺余曰承此偈見警美則美矣理則未然所謂無可無不可者畫亦得不畫亦得就其中觀像者為不得不觀像者所得如何禪在甚麽處假不以有無為礙者近乎通也思之思之文之神妙莫過於詩賦見人之志非特詩也而賦亦可以見焉唐裴晉公作鑄劍㦸為農器賦云我皇帝嗣位三十載也寰海鏡清方隅砥平驅域中盡歸力穡示天下弗復用兵則平淮西一天下已見於此賦矣范文正公作金在鎔賦云儻令區别妍􅎀願為軒鑑若使削平禍亂請就干將則公負將相器業文武全才亦見於此賦矣公又為水車賦其末云方今聖人在上五日一風十日一雨則斯車也吾其不取意謂水車唯施於旱嵗嵗不旱則無所施則公之用捨進退亦見於此賦矣葢公在寳元康定間遇邊鄙震聳則驟加進擢及後晏靜則置而不用斯亦與水車何異王沂公有物混成賦云不縮不盈賦𧰼寧窮於廣狹匪彫匪斵流形罔滯於盈虚則宰相陶鈞運用之意已見於此賦矣又云得我之小者散而為草木得我之大者聚而為山川則宰相擇任羣材使小大各得其所又見於此賦矣宋莒公兄弟平時分題課賦莒公多屈於子京及作鷙鳥不􅀟賦則子京去兄逺甚莒公遂擅場賦曰天地始肅我則振羽而獨來燕鳥焉知我則凌雲而自致又曰將翺將翔詎比海鶼之翼自南自北若專霜隼之誅則公之特立獨行魁多士登元宰亦見於此賦矣青箱雜記卷十
