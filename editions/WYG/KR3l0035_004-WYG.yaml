  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0035_WYG_004-1a, image: WYG1036/WYG1036-0625a.png}
body:
  text: 青箱雜記卷四宋呉處厚撰荀子曰相形不如論心諺曰有心無相相逐心生有相無心相隨心滅此言人以心相為上也故心相有三十六相夫人嘗言意氣求官自須如此一也為事有剛有柔二也慕善近君子三也有美食常分惠人四也不近小人五也常行隂徳毎事方便六也從小能治家七也不厭人乞覔八也利人克己九也不遂惡貪殺十也聞事不驚張十一也與人期不失信十二也不易行改操十三也夜臥不便睡着十四也馬上不回頭顧十五也夜不令人生憎怒十六也不文過飾非十七也為人作事周匝十八也得人恩力不忘十九也自小便有大量二十也不毁善害惡二十一也憐孤濟寡􅇥物二十二也不助強欺弱二十三也不忘故舊之分二十四也為事衆人用之二十五也不多言妄語二十六也得人物毎生慚愧二十七也聲美音有序二十八也當人語次不先起二十九也常言人善事三十也不嫌惡衣惡食三十一也方圓曲直隨時三十二也聞善行之不倦三十三也知人饑渴勞苦常有以恤之三十四也不念舊惡三十五也故舊有難竭力救之三十六也已上三十六善皆全者當位極人臣壽考令終或有不全則禍福相折以次减殺具二十者刺史之位具十以上令佐之官具五七者亦須大富人之心相外見於目孟子曰知人者莫良於眸子胷中正則眸子瞭然胷中不正則眸子眊然此其大槩也而其間善惡又更多端凡䀤睮上音茂下音俞唊囁者嫉妬人也盱睢􅀈丁結切􅀈火彼切者惡性人也闕䂅呼間切矘他郎切晃者憨呼占切人也䀡丁念切䁠罄謙切珉􅀈時斤切者滛亂人也睢盱睒音閃爍者邪人也彌詞俚人言也矒䁬者姦詐人也應徴拗􅀈故巧切者崛強人也羊目􅀈烏江切瞳者毒害人也睛色雜而光浮淺者心不定無信人也睛色光彩溢出者聦明人也睛色紫黒而光彩端諦者好𨼆遁人也睛色黄瞻視端直者慕道術人也睛多光而不溢不散徹而瞻視端直者慕道術人也睛􅇥眨俱夫切者若不嫉妬即虛妄人也又商臣王敦蜂目王莾露眼赤睛梁冀洞睛矘眄則惡逆之相亦見於目余昔年嘗任汀州掌獄録見殺母黄曾其目睛黄小而光跌宛若蜂狀則蜂目之惡逆尤驗也昔人謂官至三品不讀相書自識貴人以其閱多故也本朝巨公吕文靖夏文莊楊大年馬尚書皆有人倫之鑒故其賞罰未嘗妄謬而任使之際亦多成功李勣曰無福之人不可與其事斯言信矣夏文莊公謫守黄州時龎頴公為郡掾文莊識之異禮優待而龎嘗有疾以為不起遂屬文莊後事文莊親臨之曰異日管為貧宰相亦有年壽疾非其所憂龎語之曰已為宰相豈得貧耶文莊曰但於一等人中為貧耳故龎公晩年退老作詩述其事曰田園貧宰相圗史富書生為是故也又文莊守安州宋莒公兄弟尚皆布衣文莊亦異待命作落花詩莒公一聨曰漢皋珮冷臨江失金谷樓危到地香子京一聨曰將飛更作回風舞已落猶成半面粧是嵗詔下兄弟將應舉文莊曰詠落花而不言落大宋君當狀元及第又風骨秀重異日作宰相小宋君非所及然亦須登嚴近後皆如其言故文莊在河陽莒公登庸以别紙賀曰所喜者昔年安陸已識台光葢為是也又樞密孫公固亦小官時曾謁文莊文莊許他日當踐樞幄今亦騐焉楊公大年尤負藻鑒在翰林日與章郇公其事嘗言郇公異日必作相已所不及又見著作佐郎張士進知其有宰相器即薦之由此大拜又鄉人呉待問嘗從公學公語其徒曰汝輩勿輕小呉小呉異日須登八座亦有年壽後皆如其言待問即春卿冲卿父也馬尚書亮知廬州見翰林王公洙為小官馬公曰子全似宋白異日官至八座由此異待通判疾之後羅織王公遂以罪免乃曰你這回更做宋尚書其後王公竟登近侍及卒贈尚書余嘗謂風鑒一事乃昔賢甄識人物㧞擢賢才之所􅇥非市井􅁲相之流用以賈鬻取貲者故春秋單襄公成肅公之徒毎遇㑹同則先觀威儀以省禍福而前世郭林宗裴行儉又考器識以言臧否然余亦粗知大槩常與苖文忠公論之文公曰觀子之論多取豐厚是則屠兒䬪飥師皆貴矣余復思之大凡相之所先全在神氣與心術更或豐厚其福十全國語曰今王逺角犀豐盈而比頑童窮固則豐盈固賢哲相也太尉程公勘侍郎掌公禹錫俱以庚寅三月十日生程子時掌午時二公同年及第程作樞密副使晩年帥延安建節而掌以工部侍郎致仕位不逮於程而二公享壽脩短不差程以治平三年二月薨掌以其年三月捐舘翰林王公洙脩撰錢公延年俱以丁酉八月丑時生王十九日錢二十日錢以嘉祐六年六月卒時王公已病或謂王公起於寒素早嵗蹇剥庶可以免灾侍郎掌公曰錢雖少年榮進晩即滯留王雖早嵗竒蹇晩即遷擢長短比折禍福適均王公竟不起梁少卿吉府宋郎中咸俱乙未八月二日生梁申時宋巳時梁二十八已為太子中書舍通判饒州而宋猶未第客游鄱陽有日者妙於星術宋徃叩之日者曰秀才命似本州通判他日官職亦相𩔖壽則過之後皆如其言王端明素盧太尉政俱以丁未八月二十四日辰時生而王出於貴胄盧起於軍伍王卒於邊藩盧薨於殿帥事皆略同亦可恠也但盧之壽考有過於王得非以少年微賤耶張尚書方平李給事徽之王秘監端俱以丁未九月二十三日生張酉時李夘時王戌時迄今皆致政康強劉忱過鳴犢鎮見所由張秀問其年甲與忱同辛酉八月二十四日生劉午時秀巳時後秀陜西効用有功累官至團練使卒卒之年忱任利路運使因出巡乗轎撲落崖亦幾於死龍圗劉公曄未第前娶趙尚書晃之長女早亡而趙氏猶有二妹皆未適人既而劉公登科晃已捐舘夫人復欲妻之使媒婦通意劉公曰若是武有之徳則不敢為姻如言禹别之州則庶可從命葢劉公不欲七姨為匹意欲九姨議姻故也夫人詰之曰諺云薄餅從上揭劉郎纔及第豈得便簡㸃人家女劉公曰非敢有擇但七姨骨相寒薄非某之對九姨乃宜匹遂娶九姨後生七子皆至大官七姨後適關生竟不第落泊寒餒暮年劉氏養之終身青箱雜記卷四
