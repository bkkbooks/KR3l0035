body:
  text: 青箱雜記卷二宋呉處厚撰龔頴邵武人先仕江南歸朝為侍御史嘗憤叛臣盧絳殺其叔慎儀又害其家後絳來陛見舞蹈次頴遽前以笏擊而踣之太祖驚問其故頴曰臣為叔父復讐非有他也因俯伏頓首請罪極言絳狼子野心不可畜太祖即下令誅絳而赦頴頴自負文學少許人談論多所折難太宗朝知朗州士罕造其門獨丁謂䞇文求見頴倒屣延迓酧對終日以至忘食曰自唐韓栁後今得子矣異日丁獻詩於頴頴次韻和酧曰膽怯何由戴鐵冠秪縁昭代奬孤寒曲肱未遂違前志直指無聞是曠官三署毎傳朝客說五溪閑凭郡樓看祝君早得文場雋况值天堦正舞干慎儀亦任江南為尚書禮部侍郎崇政殿學士嘗奉使嶺表劉主囚之踰年不遣慎儀憂悸不知所出乃然頂禱佛願捨宅建寺庶遂生還未幾劉主女病譫語曰且􅇥遣龔慎儀歸國不然我即死劉主懼遣之慎儀尋歸以宅為寺即今邵武玉堂里香嚴寺是也江南平以慎儀為歙州刺史盧絳領叛兵數千入其城慎儀坐黄堂治事有絳部曲小校熊進直前刄之舉族遇害惟二女弗忍殺擕以自隨比入閩中二女猶記憶鄉里至玉堂香嚴寺徘徊不前曰此是我家就死足矣絳即殺之里老言慎儀為兒時戱於道傍有胡僧過目之曰此兒骨法亦貴但恨有㐫相恐不得令終竟如其言五代之際天下剖裂太祖啟運雖則下西川平嶺表收江南而呉越荆閩納籍歸覲然猶有河東未殄其後太宗再駕乃始克之海内自此一統故因御試進士乃以六合為家為賦題時進士王世則遽進賦曰搆盡乾坤作我之龍樓鳯閣開窮日月為君之玉戸金關帝覽之大恱遂擢為第一人是年李巽亦以六合為家賦登第賦云闢八荒而為庭衢并包有截用四海而作藩屛善閉無關此亦善矣然不若世則之雄壯巽字仲權邵武人以蜃樓土鼔周處斬蛟三賦馳名累舉不第為鄉人所侮曰李秀才應舉空去空回知席帽甚時得離身巽亦不較至是乃遺鄉人詩曰當年踪跡困泥塵不意乗時亦化鱗為報鄉閭親戚道如今席帽已離身葢國初猶襲唐風士子皆曵袍重戴出則以席帽自隨巽後仕至度支郎中兩浙轉運使卒與王禹偁相友善今小畜集有送李仲權赴官序即巽也世傳潘閬安鴻漸八才子圖皆策蹇重戴又禹偁贈崔遵慶及第詩云且留重戴士風多則國初舉子猶重戴矣天聖以前烏幘惟用光紗自後始用南紗迨今六十年復稍稍用光紗矣世傳陳執中作相有壻求差遣執中曰官職是國家的非卧房籠篋中物壻安得有之竟不與故仁宗朝諫官累言執中不學無術非宰相器而仁宗注意愈堅其後諫官面論其非曰陛下所以眷執中不替者得非以執中嘗於先朝乞立陛下為太子耶且先帝止二子而周王已薨立嗣非陛下而誰執中何足貴仁宗曰非為是但執中不欺朕耳然則人臣事主宜以不欺為先執中好閲人而解賔王最受知初為登州黄縣令素不相識執中一見即大用勅舉京官及後作相又薦舘職賔王仕至工部侍郎致政家雄富諸子皆京秩年七十餘卒賔王為人方頥大口敦龎重厚左足下有黒子甚明大馮瀛王道詩雖淺近而多諳理若但知行好事莫要問前程須知海岳歸明主未省乾坤陷吉人之𩔖世雖盛傳而罕見其全篇今並録之詩曰窮達皆由命何勞發嘆聲但知行好事莫要問前程冬去氷須泮春來草自生請君觀此理天道甚分明又偶作云莫為危時便愴神前程往往有期因須知海岳歸明主未省乾坤陷吉人道徳幾時曾去世舟車何處不通津但教方寸無諸惡狼虎叢中也立身世譏道依阿詭隨事四朝十一帝不能死節而余嘗采道所言與其所行參相考質則道未嘗依阿詭隨其所以免於亂世葢天幸耳石晉之末結釁邊境懼無敢奉使者宰相選人道即批奏臣道自去舉朝失色皆以謂墮於虎口而道竟生還又彭門卒以道為賣己欲兵之湘隂公曰不干此老子事中亦獲免初郭威遣道迓湘隂道語威曰不知此事由中否道平生不曽妄語莫遣道為妄語人及周世宗欲收河東自謂此行若太山壓卵道曰不知陛下作得山否凡此皆推誠任直委命而行即未嘗有所顧避依阿也又契丹嘗問道萬姓紛紛何人救得而道發一言以對不啻活生靈百萬葢俗人徒見道之迹不知道之心道迹濁心清豈世俗所知耶余嘗與富文忠公論道之為人文忠曰此孟子所謂大人也張文定公齊賢洛陽人少時家貧父死無以葬有河南縣史某甲為辦棺歛公深徳之遂展兄事雖貴不替後趙普密薦齊賢於太宗太宗未用普即具列前事以為陛下若擢齊賢則齊賢他日感恩過於此太宗大恱未幾擢齊賢為相齊賢相太宗真宗皆以亮直重厚稱及晚娶薛氏婦真宗不恱一旦元㑹上壽齊賢已微醺進止失容坐是謫安州其麻曰仍復酣醟杯觴欹傾冠弁葢為是也齊賢常作詩自警兼遺子孫雖詞語質朴而事理切當足為規戒其曰慎言渾不畏忍事又何妨國法須遵守人非莫舉揚無私仍克己直道更和光此箇如端的天應降吉祥余嘗廣其意就毎句一篇命曰八詠警戒詩其一云慎言渾不畏言出患常隨須信機樞發難容駟馬追三緘事可見兩舌業當知口是起羞本闕君且再思其二云忍事有何妨勿令心火揚火揚猶可滅心忿固多傷堪嘆波羅密可憐歌利王從心更從刃字意好端詳其三云國法須遵守金科盡詔條一毫如有犯三尺不相饒豈肯容姦􅃛何須恃貴驕自然逢吉慶神理亦昭昭其四云人非莫舉揚萬事且包荒殿上便猶掩車中吐不妨在他誠所短於已有何長須是常規檢回頭自忖量其五云無私仍克己克己又無私一事兼脩飾終身在有思公清多歛怨髙亢易招危更切循卑退方應履坦夷其六云直道更和光􅀟脩譽乃彰直須和輔助和頼直交相恃直終多訐偏和又少剛能和又能直行已自芬芳其七云此箇如端的除非六句脩永為几杖誡更遺子孫謀本立方生道農勤乃有秋兹詩雖淺近至理可推求其八云天應降吉祥天理本茫茫舒慘雖無定榮枯却有常益謙尤効驗福善更昭彰籠絡無踈漏恢恢網四張皇祐嘉祐中未有謁禁士人多馳騖請託而法官尤甚有一人號望火馬又一人號日遊神葢以其日有奔趨聞風即至未嘗暫息故也李侍郎仲容濤相之後吉徳恬退不與物校時人目為李佛子享年七十臘月八日無疾而逝觀文丁公度為撰墓誌叙其為人曰天禧中士風奔競公在文舘淡然自守同列中負人倫之鑒者曰李公他日名位顯年壽髙我輩俱不及迄今皆騐太祖廟諱匡𦙍語訛近香印故今世賣香印者不敢斥呼鳴羅而已仁宗廟諱貞語訛近蒸今内庭上下皆呼蒸餅為炊餅亦此𩔖錢武肅王諱鏐至今呉越間謂石榴為金櫻劉家留家為金家田家留住為駐住又楊行密據江淮至今民間猶謂􅁡為蜂糖滁人猶謂荇溪為菱溪則俗語承諱久未能頓易故也劉溫叟父名岳終身不聽樂不遊嵩華毎赴内宴聞鈞奏回則號泣移時曰若非君命則不至於是此與唐李賀父名晉肅賀不敢舉進士事頗相𩔖杜祁公衍常言父母之名耳可得聞口不可得言則所諱在我而已他人何預焉故公帥并州視事未三日孔目吏請公家諱公曰下官無所諱惟諱取枉法贓吏悚而退公酷嗜吟詠致政後作林下書懐詩曰從政區區到白頭一生寧肯顧恩讐􅀟鳬乗鴈常深媿野馬黄羊亦過憂豈是林泉堪佚老只縁蒲栁不禁秋始終幸㑹承平日樂聖唯能擊壤謳然余不見野馬黄羊事後讀唐張說傳乃見之則所謂吾肉非黄羊必不畏喫血非野馬必不畏刺是已余皇祐壬辰嵗取國學解試律設大法賦得第一名樞密邵公元翰林賈公黯密直蔡公杭脩注江公休復為考官内江公尤見知語余曰滿場程試皆使蕭何惟足下使蕭規對漢約足見其追琢細膩又所問春秋策對荅詳備及賦押秋荼之密用唐宗赦受縑事諸君皆不見云只有秦法繁於秋荼密於凝脂然則君何出余避席歛衽自陳逺方寒士一旦程文誤中甄采因對自文選策秀才文有解秋荼之密網唐宗赦受縑事出杜佑通典唐書即入載公大喜又曰滿場使次骨皆作刺骨對凝脂惟足下用杜周傳作次骨又對吹毛只這亦堪作解元余再三遜謝是舉登科名在行間授臨汀獄掾公作詩送余曰太學魯諸生南州漢掾卿故鄉千里外丹桂一枝榮莫嘆科名屈難將力命爭他年重射策詞句太縱横葢公欲激余應大科故也樞密邵公亦蒙屢加論薦常謂余詩淺切有似白樂天一日閲相國寺書肆得馮瀛王詩一帙而歸以語之公曰子詩格似白樂天今又愛馮瀛王將來捻取箇豁達李老慶厯中京師有民自號豁達李老毎好吟詩而詞多鄙俚故公以戱之遂皆大笑然余賦才鄙拙不能強為豪爽今齒已老而詩格定時時遣興實有李老之風足見公之知言也熈寧中余辟定武管勾機宜文字公時牧鄆州附所作詩一大軸并寄余詩曰流年直似隙中駒别後情懐懶似踈天上又頒新嵗厯床頭未荅故人書慇懃魚鴈功曹檄狼藉盃盤上客魚好在仲宣家萬里從軍苦樂定何如未幾公即捐舘迄今追念知己每增感愴青箱雜記卷二
