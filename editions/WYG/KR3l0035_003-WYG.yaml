body:
  text: 青箱雜記卷三宋呉處厚撰真宗聽政之暇唯務觀書每觀畢一書即有篇詠使近臣􅆳和故有御製看尚書詩三章看周禮三章看毛詩三章看禮記三章看孝經三章復有御製讀史記三章讀前漢書三首讀後漢書三首讀三國志三首讀晉書三首讀宋書二首讀陳書二首讀魏書三首讀北齊書二首讀後周書三首讀隋書三首讀唐書三首讀五代梁史三首讀五代後唐史三首讀五代晉史二首讀五代漢史二首讀五代周史二首可謂近代好文之主也前世有翰林學士本朝咸平中復置翰林侍讀學士以楊徽之夏侯嶠吕文仲為之又置翰林侍講學士以邢昺為之則翰林侍讀與侍講學士自楊徽之邢昺等始也景徳中上欲優寵王欽若乃特置資政殿學士以處之既而有司定議班在翰林學士下尋又置資政殿大學士亦以欽若為之而班在翰林承㫖之上則資政殿學士與大學士皆自王欽若始也後唐明宗不知書毎四方章奏止令樞密使安重誨讀之而重誨亦不曉文義宰相孔循請置端明殿學士二員班在翰林學士上以馮道趙鳯為之則端明學士自馮道趙鳯始也國初亦嘗置此職而班在翰林學士之下尋改逮明道初復改承明殿為端明再置端明殿學士而班在資政殿學士下以宋綬為之則本朝端明殿學士自宋綬始也本朝太宗御書及典籍圖畫寳瑞之物並藏於龍圖閣而閣有學士直學士待制直閣故景徳初杜鎬戚綸為龍圖閣待制不數年鎬遷龍圖閣直學士班在樞密直學士下至祥符中鎬又遷龍圖閣學士而班在樞密直學士上則本朝龍圖閣待制龍圖閣直學士龍圖閣學士皆自杜鎬始也又祥符末年以崇文院檢討馮元為太子中允直龍圖閣則本朝直龍圖閣自馮元始也本朝真宗御集御書並藏於天章閣天聖末始置待制以范諷為之景祐中又置侍講以賈昌朝趙希言王宗道為之則本朝天章閣待制天章閣侍講自范諷賈昌朝等始也梁祖都汴庶事草創正明中始於今右長慶門東北創小屋數十間為三舘湫隘尤甚又周廬徼道咸出其間衞士騶卒朝夕喧雜毎受詔撰述皆移他所至太平興國中車駕臨幸顧左右曰若此卑陋何以待天下賢俊即日詔有司規度左舁龍門東北東府地為三舘命内臣督役晨夜兼作不日而成尋下詔賜名崇文院以東廊為昭文舘書庫南廊為集賢院書庫而廊以經史子集四部為史舘庫凡六庫書籍正副本八萬卷斯亦盛矣昭文舘本前世𢎞文舘建隆中以其犯宣祖廟諱改焉至淳化初以吕祐之趙昻安徳裕句中正並直昭文舘則本朝昭文舘自吕祐之等始也集賢有直院有校理端拱初以李宗諤為集賢校理淳化初以和懞為直集賢院則本朝直集賢校理自和懞李宗諤始也史舘有直舘有脩撰有編脩有校勘有檢討太平興國中趙隣幾吕蒙正皆為直史舘掌脩撰而楊文舉為史舘編脩是時脩撰未列於職至至道中始以李若拙為史舘脩撰雍熈中以宋闕為史舘校勘淳化中以郭延澤董元亨為史舘檢討則本朝直史舘脩撰史舘編脩史舘校勘史舘檢討自趙隣幾吕蒙正李若拙楊文舉宋闕郭延澤董元亨等始也本朝三舘之外復有秘閣圖書故秘閣置直閣史置校理咸平中以杜鎬為秘閣校理後充直秘閣則本朝直秘閣秘閣校理皆自杜鎬始也嶺南風俗相呼不以行第唯以各人所生男女小名呼其父母元豐中余任大理丞斷賔州奏案有民韋超男名首即呼韋超作父首韋遨男名滿即呼韋遨作父滿韋全男女名揷娘即呼韋全作父揷韋庶女名睡娘即呼庶作父睡妻作嬸睡韓退之羅池廟碑言歩有新船或以歩為渉誤也葢嶺南謂水津為歩言歩之所及故有罾歩即漁者施罾者有船歩即人渡船處然今亦謂之歩故揚州有􅆶歩洪州有觀歩閩中謂水涯為溪歩嶺南謂村市為虚栁子厚童區乙傳云之虚所賣之又詩云青箬褁鹽歸峒客綠荷包飯趂虛人即此也葢市之所在有人則滿無人則虛而嶺南村市滿時少虛時多謂之為虛不亦宜乎又蜀有痰市而間日一集如痰瘧之一發則其俗又以冷熱發歇為市喻史記稱四夷各異􅁲漢書稱粤人以雞􅁲信有之矣元豐中余任大理丞斷嶺南奏案韋庶為人所殺疑屍在潭中求而弗獲庶妻何以鐺就岸㸑煮雞子􅁲之呪曰儂來在箇澤裏來在别處少頃雞子熟剖視得儂韋全曰雞卵得儂屍在潭􅂻果得之然不知所謂得儂者其兆如何也又有鳥􅁲東女國以十一月為正至十月令巫者齎酒肴詣山中散糟麥於空大呪呼鳥俄頃有鳥如雉飛入巫者懐中即剖其腹視之有一穀米嵗必登若有霜雪則多異災又或擊一丸或打楊枝或杓聽旁人之語亦可以􅁲吉㐫葢誠之所感觸物皆通不必專用龜策也鄉人危序應舉探省牓出門數歩即逢泥濘躊蹰未前有老嫗指示曰秀才可低處過危即從之比看榜最末有名是嵗果及第此與摭言所載後來者必銜得事頗相𩔖原武鄭公戩天聖中舉進士嘗與同輩賭彩選一坐盡負獨戩贏數百緍是嵗第三人及第鄉人上官極累舉不第年及五十方得解赴省試游相國寺買詩一冊紙已熏晦歸視其表乃五代時門狀一幅曰勅賜進士及第馬極右極伏蒙禮部放牓勅賜及第謹詣李文定公迪美鬚髯未御試一夕忽夢􅀍人剃削俱盡迪亦惡之有解者曰秀才須作狀元縁今嵗省元是劉滋已替滋矣非狀元而何是嵗果第一人相國劉公沆累舉不第天聖中將辦裝赴省試一夕夢􅀍人砍落頭心甚惡之有鄉人為解釋曰狀元不到十二郎做劉公第十二只得第二人劉公因詰之曰雖砍却頭留沆在􅂻葢南音謂項為沆留劉同音後果第二人及第馬尚書亮知江寧府秩滿將代一夕夢舌上生毛有僧解之曰舌上生毛剃不得尚書當再任已而果然劉郎中滋累舉不第年餘四十始遂登科嘗夢有人提印滿籃令己吞之滋有難色其人曰但任意吞看得幾顆滋不得已吞至十四顆其印皆顆顆見於腹中後果厯十四任終韓魏公應舉時夢打毬一捧盂八時魏公年僅弱冠一上登科則一捧盂八之應也孫樞密抃舊名貫應舉時嘗夢至官府潭潭深逺寂若無人大㕔上有抄録人名一卷意以為牓遍覽無名偶覩第二名下有空白處抃欲填之空中人語曰無孫貫有孫抃夢中即填孫抃是嵗果第三名因夢得丁咸序應舉時夢唱名有龍起駱起二人已過續有一龍蜿蜒騰上又有一駱駝繼之不知其然比唱名有龍起駱起二人在其後鄉人龔國隆應舉時夢行道上歩歩俯拾黑豆一掬不知其然是嵗鄉薦乃伯父郎中紀恤其乏路費以驛劵贈之遂沿路勘請以抵京師歩歩掬黑豆之應也然此微薄而國隆已兆於夢則其人賦分可知後國隆竟老場屋不沾一命鄉人朱熈鄰景祐中舉進士夢造棺缺板而弗成是嵗止過省不及第晩遇推恩長史出身棺不全之應也青箱雜記卷三
