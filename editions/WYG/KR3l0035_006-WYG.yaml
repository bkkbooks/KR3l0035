body:
  text: 青箱雜記卷六宋呉處厚撰王禹偁老精四六有同時與之在翰林而大拜者王以啟賀之曰三神山上曾陪鶴駕之游六學士中獨有漁翁之嘆白樂天嘗有詩云元和六學士五相一漁翁故也禹偁詩多記實中的作趙普挽詞云𤣥象中台折皇家上相薨大功銘玉鉉密事在金縢宋闕挽詞曰先帝升遐日詞臣寓直時柩前言顧命筆下定鴻基葢普嘗密賛太宗而宋為内相宿直遇太宗升遐是夜草遺制立真宗故也云此事湜家亦不知唯以公挽詞為傳信劉昌言泉州人先仕陳洪進為幕客歸朝願𥙷校官舉進士三上始中第後判審官院未百日為樞密副使時有言其太驟者太宗不聽言者不已乃謂昌言閩人語頗獠恐奏對間陛下難㑹太宗怒曰我自㑹得其眷如此然昌言極有才思當下第作詩落句云惟有夜來蝴蝶夢翩翩飛入刺桐花後為商丘闕王禹偁贈詩曰年來復闕事堪嗟載筆商丘􅁂欲華酒好未陪紅杏晏詩狂多憶刺桐花葢為是也刺桐花深紅毎一枝數十蓓藟而葉頗大𩔖桐故謂之刺桐唯閩中有之昔王維愛孟浩然吟哦風度則繪為圗以翫之李洞慕賈島詩名則鑄為像以師之近世有好事者以潘閬遨遊浙江詠潮著名則亦以輕綃冩其形容謂之潘閬詠潮圗閬酷嗜吟自號逍遥子嘗自詠苦吟詩曰髮任莖莖白詩須字字清又貧居詩曰長喜詩無病不憂家更貧又峽中聞猿云何須三呌絶已恨一聲多哭髙舍人云生前是客曾投卷死後何人與撰碑寄張詠云莫嗟黒髮從頭白終見黄河到底清皆佳句也故宋尚書白贈詩曰宋朝歸聖主潘閬是詩人王禹偁亦贈詩云江城買藥常將鶴古寺看碑不下驢其為明公賞激如此又魏野陜府人亦有詩名㓂萊公毎加前席野獻萊公生日詩云何時生上相明日是中元以萊公七月十四日生故也又有贈萊公詩云有官居鼎鼐無地起樓臺而其詩傳播漠北故真宗末年嘗有北使詣闕詢於譯者曰那箇是無地起樓臺的宰相時萊公方居散地真宗即召還授以北門管鑰世傳魏野嘗從萊公游陜府僧舍各有留題後復同游見萊公之詩已用碧紗籠䕶而野詩獨否塵昏滿壁時有從行官妓頗慧􅃛即以袂就拂之野徐曰若得常將紅袖拂也應勝似碧紗籠萊公大笑又錢塘林逋亦著髙節以詩名當世名公多與之游天聖中丞相王公隨以給事中知杭州日與唱和親訪其廬見其頽陋即為出俸錢新之逋乃以啟謝王公其畧曰伏蒙府主給事差人送到留題唱和石一片拜世軒榮以庇風日衡茅改色猿鳥交驚夫何至陋之窮居獲此不朽之竒事竊念頃者清賢鉅公出鎮藩服亦常顧丘樊之側微念土木之衰病不過一枉駕一式廬而已未有迂回玉趾厯覽環堵當纓㽔之盛集攄風雅之祕思率以􅆳載始成編軸且復搆他山之堅潤刋羣言之鴻麗珠聨綺錯雕縟相照輦植置立賁于空林信可以奪山水之清暉發斗牛之寳氣者矣迨景祐初逋尚無恙范文正公亦過其廬贈逋詩曰巢由不願仕堯舜豈遺人又曰風俗因君厚文章到老醇其激賞如此王公隨雅嗜吟詠有宫詞云一聲啼鳥禁門靜滿地落花春日長又野步云桑斧刋春色漁歌唱夕陽皆公應舉時行卷所作也近世釋子多務吟詠唯國初賛寧獨以著書立言尊崇儒術為佛事故所著駁董仲舒繁露二篇難王充論衡三篇證蔡邕獨斷四篇斥顔師古正俗七篇非史通六篇荅雜斥諸史五篇折海潮論兼明録二篇抑春秋無賢臣論一篇極為王禹偁所激賞故王公與賛寧書曰累日前蒙惠顧謏才辱借通論日殆三復未詳指歸徒觀其滌繁露之瑕劘論衡之玷眼瞭獨斷之瞽鍼砭正俗之疹折子𤣥之邪說泯米頴之巧言逐光庭若摧枯排孫郤似圖蔓使聖人之道無傷於明夷儒家者流不至於迷復然則師胡為而來哉得非天祚素王而假手於我師者歟人臣作賦頌賛君徳忠愛之至也故前世司馬相如吾丘壽王之徒莫不如此而本朝亦有焉吕文靖公賈魏公則嘗獻東封頌夏文莊公則嘗獻平邊頌廣文頌朝陵頌廣農頌周伯星頌大中祥符頌靈寳真文頌龎頴公則嘗獻肇禋慶成頌今元獻晏公宣獻宋公遭遇承平嘉瑞來還所獻賦頌尤為多焉王文穆公欽若臨江軍人母李氏父仲華嘗侍祖郁任官鄂渚而李氏有娠就蓐之夕江水暴溢將壊􅅟舍亟遷于黄鶴樓始免身生男即公也時隔岸漢陽居人遥望樓際若有光景氣象云又公昔嵗行圃田道中宿于村舍夜起視天中有赤文成紫微二大字光耀奪目使蜀還褒城路中有人展謁熟視刺字乃唐相裴度告公以黙定之語及言公他日當貴兹亦異矣後公每設壇禮神必朱紫􅅔二字陳之醮所又輟俸修晉公祠於圃田作記以述其肹蠁云真宗封岱祠汾雖則繼述先志昭荅靈貺中外臣民恊謀同欲然實由文穆之力賛焉祠禮畢章聖登太山頂偕近臣周覽前代碑刻内一碑首云朕欽若昊天真宗顧文穆笑曰元來此事前定只是朕與相文穆不惟􅀍章聖顧遇至於明肅太后亦深眷焉先是知邵武軍呉植餉金於文穆而誤投沂公之第沂公以聞植坐追停文穆以不知寢不問故植之貶詞曰如何匪人瀆我元老此可見矣世傳文穆遭遇章聖本由一言之寤葢章聖踐祚之初天下宿逋數百萬計時文穆判三司理欠司一日抗䟽請盡蠲放以惠民上遽召詰之曰此若惠民曷為先帝不行公對曰先帝所以不行者欲以遺陛下使結天下人心於是上慼然頷之未幾命宰府召試孝為徳本頌授右正言知制誥不數年遂大拜曹翰嘗平江南有功後歸環衞數年不調一日内宴太宗侍臣皆賦詩翰以武人不預乃自陳曰臣少亦學詩亦乞應詔太宗笑而許之曰卿武人宜以刀字為韻翰援筆立進因以寄意曰三十年前學六韜英名常得預時髦曾因國難披金甲不為家貧賣寳刀臂健尚嫌弓力軟眼明猶識陣雲髙庭前昨夜秋風起羞覩盤花舊戰袍太宗覽之惻然即自環衞驟遷數級柳崇儀開家雄於財好交結樂散施而季父主家多靳不與時趙昌言方在布衣旅游河朔因以謁開開屢請以錢乞趙季父不與開乃夜搆火燒舍季父大駭即出錢三百緡乞趙由此恣其所施不復吝也盛文肅公正剛蹇絶無它腸而性微狷􅇥時為内相孫抃方召議舘職以文投之文肅大怒曰投贄盡皆邪道非公朝所尚呵責再三孫惶恐失措而退比試學士院孫夙夕憂其擯落文肅乃題所試卷為三等上其公正如此閩人謂子為囝謂父為郎罷故顧况有哀囝一篇曰囝生閩方閩吏得之乃絶其陽為臧為獲致金滿屋為髠為鉗如視草木天道無知我罹其毒神道無知彼受其福郎罷别囝吾悔生汝及汝既生人勸不舉不從人言果獲是苦囝别郎罷心摧血下隔地絶天及至黄泉不得在郎罷前葢唐世多取閩童為閹奴以進之故况陳其苦以諷焉青箱雜記卷六
